<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Consulta</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }
        .barra-superior {
            background-color: #13303F;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .barra-superior h1 {
            margin: 0;
            font-size: 22px;
        }
        .conteudo {
            padding: 40px;
            text-align: center;
        }
        .conteudo h2 {
            font-weight: normal;
            color: #333;
            margin-bottom: 25px;
        }
        .grade-opcoes {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .cartao-opcao {
            display: block;
            text-decoration: none;
            background-color: #13303F;
            color: white;
            border-radius: 12px;
            padding: 25px 30px;
            min-width: 220px;
            text-align: left;
            transition: opacity 0.2s;
        }
        .cartao-opcao:hover {
            opacity: 0.85;
        }
        .cartao-opcao .titulo {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .cartao-opcao .descricao {
            font-size: 13px;
            color: #cbd5db;
        }
        .cartao-opcao.desabilitado {
            background-color: #e8ebed;
            color: #8a8f94;
            cursor: default;
            pointer-events: none;
        }
        .cartao-opcao.desabilitado .descricao {
            color: #a0a5aa;
        }
    </style>
</head>
<body>
    <div class="barra-superior">
        <h1>INNOVEX MANAGEMENT</h1>
    </div>

    <div class="conteudo">
        <h2>Selecione uma opção:</h2>

        <div class="grade-opcoes">
            <a href="/rede" class="cartao-opcao">
                <div class="titulo">Consultar Rede Credenciada</div>
                <div class="descricao">Verificar especialidades habilitadas por rede</div>
            </a>

            <a href="/matricula" class="cartao-opcao">
                <div class="titulo">Consultar Matrícula</div>
                <div class="descricao">Consultar situação do beneficiário</div>
            </a>
        </div>
    </div>
</body>
</html>
